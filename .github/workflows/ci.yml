name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements-dev.txt
      - run: pip install -r server/requirements-dev.txt
      - run: ruff check server
      - run: ruff format server --check
      - run: PYTHONPATH=server pytest
      - run: python -m compileall -q server/okk_mcp server/scripts server/tests server/migrations
      - working-directory: server
        run: PYTHONPATH=. alembic -c alembic.ini heads
      - working-directory: server
        run: PYTHONPATH=. alembic -c alembic.ini upgrade head --sql > /tmp/okk-mcp-schema.sql
