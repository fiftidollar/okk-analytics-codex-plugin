services:
  mcp:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: >-
      sh -c "alembic -c alembic.ini upgrade head &&
      uvicorn okk_mcp.main:app --host 0.0.0.0 --port 8020
      --proxy-headers --forwarded-allow-ips='*'"
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://okk_mcp:${POSTGRES_PASSWORD}@postgres:5432/okk_mcp
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      OKK_API_BASE_URL: https://okk-backend.akfixdev.ru/api/v1
      MCP_OAUTH_SECRET: ${MCP_OAUTH_SECRET}
      MCP_SESSION_ENCRYPTION_SECRET: ${MCP_SESSION_ENCRYPTION_SECRET}
      MCP_ISSUER_URL: https://okk-mcp.akfixdev.ru
      MCP_RESOURCE_URL: https://okk-mcp.akfixdev.ru/mcp
      MCP_ACCESS_TOKEN_MINUTES: "60"
      MCP_REFRESH_TOKEN_DAYS: "30"
      MCP_LOGIN_ATTEMPTS_PER_MINUTE: "8"
      MCP_CLEANUP_INTERVAL_MINUTES: "60"
      MCP_AUDIT_RETENTION_DAYS: "30"
      ANALYTICS_PARALLEL_REQUESTS: "12"
      ANALYTICS_MAX_CALLS: "5000"
      TRANSCRIPT_SEARCH_MAX_CALLS: "1000"
      ANALYTICS_MAX_EMPLOYEES: "2000"
      ANALYTICS_TRACE_ENABLED: "true"
    expose:
      - "8020"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - private
      - dokploy-network
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8020/ready', timeout=5).read()
      interval: 15s
      timeout: 7s
      retries: 10
      start_period: 45s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.okk-analytics-mcp.rule=Host(`okk-mcp.akfixdev.ru`)
      - traefik.http.routers.okk-analytics-mcp.entrypoints=websecure
      - traefik.http.routers.okk-analytics-mcp.tls=true
      - traefik.http.routers.okk-analytics-mcp.tls.certresolver=letsencrypt
      - traefik.http.services.okk-analytics-mcp.loadbalancer.server.port=8020

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: okk_mcp
      POSTGRES_USER: okk_mcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okk_mcp -d okk_mcp"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

networks:
  private:
    internal: true
  dokploy-network:
    external: true

volumes:
  postgres-data:
  redis-data:
